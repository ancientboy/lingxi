<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lume - 技能库</title>
  <style>
    :root {
      --primary: #10a37f;
      --primary-dark: #0d8a6a;
      --bg-primary: #ffffff;
      --bg-secondary: #f9fafb;
      --text-primary: #1f2937;
      --text-secondary: #6b7280;
      --border: #e5e7eb;
      --shadow: rgba(0, 0, 0, 0.08);
    }

    [data-theme="dark"] {
      --primary: #10a37f;
      --primary-dark: #14b8a6;
      --bg-primary: #1f2937;
      --bg-secondary: #111827;
      --text-primary: #f9fafb;
      --text-secondary: #9ca3af;
      --border: #374151;
      --shadow: rgba(0, 0, 0, 0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-secondary);
      min-height: 100vh;
      color: var(--text-primary);
      transition: all 0.3s;
    }

    /* 顶部导航栏 */
    .navbar {
      background: var(--bg-primary);
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 8px var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .navbar-left {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      color: var(--primary);
      text-decoration: none;
    }

    .back-btn {
      background: var(--bg-secondary);
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 10px 16px;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
    }

    .back-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .theme-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      background: #f4f4f4;
      border: none;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .theme-toggle:hover {
      background: #e5e5e5;
      transform: scale(1.05);
    }

    /* 主内容区 */
    .main-container {
      display: flex;
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px;
      gap: 32px;
    }

    /* 左侧边栏 */
    .sidebar {
      width: 260px;
      flex-shrink: 0;
      background: var(--bg-primary);
      border-radius: 16px;
      padding: 24px;
      height: fit-content;
      box-shadow: 0 4px 16px var(--shadow);
      position: sticky;
      top: 100px;
    }

    .sidebar-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--border);
    }

    .agent-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .agent-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid transparent;
    }

    .agent-item:hover {
      background: var(--bg-secondary);
    }

    .agent-item.active {
      background: rgba(16, 163, 127, 0.1);
      border-color: var(--primary);
    }

    .agent-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .agent-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      flex: 1;
    }

    .agent-count {
      font-size: 12px;
      color: var(--text-secondary);
      background: var(--bg-secondary);
      padding: 2px 10px;
      border-radius: 12px;
      font-weight: 500;
    }

    /* 右侧内容区 */
    .content {
      flex: 1;
      background: var(--bg-primary);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 4px 16px var(--shadow);
      min-height: 600px;
    }

    /* 工具栏 */
    .toolbar {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 280px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: var(--bg-secondary);
      border: 2px solid var(--border);
      border-radius: 12px;
      transition: all 0.2s;
    }

    .search-box:focus-within {
      border-color: var(--primary);
      background: var(--bg-primary);
    }

    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 14px;
      background: transparent;
      color: var(--text-primary);
    }

    .search-box input::placeholder {
      color: var(--text-secondary);
    }

    .filter-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 14px 20px;
      background: var(--bg-secondary);
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .filter-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    /* 技能网格 */
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    .skill-card {
      background: var(--bg-primary);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      transition: all 0.3s;
    }

    .skill-card:hover {
      border-color: var(--primary);
      box-shadow: 0 12px 32px var(--shadow);
      transform: translateY(-4px);
    }

    .skill-card.expanded {
      border-color: var(--primary);
      box-shadow: 0 8px 24px var(--shadow);
    }

    .skill-header {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
      cursor: pointer;
    }

    .skill-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
    }

    .skill-info {
      flex: 1;
    }

    .skill-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .skill-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* 技能详情（展开后显示） */
    .skill-detail {
      display: none;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      animation: slideDown 0.3s ease-out;
    }

    .skill-card.expanded .skill-detail {
      display: block;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .skill-full-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .skill-features {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .feature-tag {
      font-size: 12px;
      color: var(--primary);
      background: rgba(16, 163, 127, 0.1);
      padding: 4px 10px;
      border-radius: 8px;
      font-weight: 500;
    }

    .skill-example {
      background: var(--bg-secondary);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .skill-example-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .skill-example-text {
      font-size: 13px;
      color: var(--text-primary);
      font-style: italic;
      padding-left: 8px;
      border-left: 3px solid var(--primary);
    }

    .skill-install-cmd {
      background: #1f2937;
      color: #10b981;
      border-radius: 8px;
      padding: 10px 12px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      display: flex;
      align-items: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .skill-install-cmd:hover {
      background: #374151;
    }

    .skill-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 16px;
      margin-top: 16px;
      border-top: 1px solid var(--border);
    }

    .skill-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .copy-btn {
      padding: 10px 24px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .copy-btn:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(16, 163, 127, 0.3);
    }

    .copy-btn.copied {
      background: #10b981;
    }

    .toggle-btn {
      background: var(--bg-secondary);
      border: 2px solid var(--border);
      border-radius: 8px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .toggle-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .toggle-icon {
      transition: transform 0.3s;
    }

    .skill-card.expanded .toggle-icon {
      transform: rotate(180deg);
    }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-secondary);
    }

    /* 移动端适配 */
    @media (max-width: 768px) {
      .navbar { padding: 12px 16px; }
      .navbar-left { gap: 12px; }
      .main-container { flex-direction: column; padding: 16px; }
      .sidebar { width: 100%; padding: 16px; position: static; }
      .agent-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
      .agent-item { flex-direction: column; padding: 12px; text-align: center; }
      .agent-icon { width: 40px; height: 40px; }
      .agent-count { margin-top: 4px; }
      .content { padding: 16px; }
      .toolbar { flex-direction: column; }
      .search-box { min-width: 100%; }
      .skills-grid { grid-template-columns: 1fr; }
    }

    /* 加载状态 */
    .loading {
      text-align: center;
      padding: 60px 20px;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body data-page="skills">
  <!-- 导航栏容器 -->
  <div id="navbar-container"></div>

  <!-- 主内容区 -->
  <div class="main-container">
    <!-- 侧边栏容器 -->
  <div id="sidebar-container"></div>

    <!-- 右侧内容区 -->
    <main class="content">
      <div class="toolbar">
        <div class="search-box">
          <span style="font-size: 18px;">🔍</span>
          <input type="text" id="skillSearch" placeholder="搜索技能...">
        </div>
        <div class="filter-group">
          <button class="filter-btn active" onclick="filterSkills('all')">全部</button>
          <button class="filter-btn" onclick="filterSkills('installed')">已安装</button>
          <button class="filter-btn" onclick="filterSkills('new')">最新</button>
        </div>
      </div>

      <div class="skills-grid" id="skillsGrid">
        <div class="loading">
          <div class="loading-spinner"></div>
          <div>加载中...</div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const AGENT_CONFIG = {
      coder: { name: '云溪', icon: '💻', color: 'linear-gradient(135deg, #10a37f 0%, #14b8a6 100%)' },
      ops: { name: '若曦', icon: '📊', color: 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)' },
      inventor: { name: '紫萱', icon: '💡', color: 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)' },
      pm: { name: '梓萱', icon: '🎯', color: 'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)' },
      noter: { name: '晓琳', icon: '📝', color: 'linear-gradient(135deg, #fa709a 0%, #fee140 100%)' },
      media: { name: '音韵', icon: '🎨', color: 'linear-gradient(135deg, #30cfd0 0%, #330867 100%)' },
      smart: { name: '智家', icon: '🏠', color: 'linear-gradient(135deg, #a8edea 0%, #fed6e3 100%)' }
    };

    let currentAgent = 'all';
    let allSkills = [];
    let installedSkills = new Set();
    let currentFilter = 'all';
    let expandedCard = null;

    async function init() {
      await loadSkills();
      await loadInstalledSkills();
      renderAgentList();
      renderSkills();
      loadTheme();
    }

    async function loadSkills() {
      try {
        const token = localStorage.getItem('lingxi_token');
        const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
        const res = await fetch('/api/skills/library', { headers });
        if (res.ok) {
          const data = await res.json();
          allSkills = data.skills || [];
          console.log('✅ 技能库:', allSkills.length, '个');
        }
      } catch (e) {
        console.error('加载技能失败:', e);
      }
    }

    async function loadInstalledSkills() {
      try {
        const token = localStorage.getItem('lingxi_token');
        const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
        const res = await fetch('/api/skills/installed', { headers });
        if (res.ok) {
          const data = await res.json();
          console.log('📡 已安装技能响应:', data);
          installedSkills = new Set((data.skills || []).map(s => s.id || s));
          console.log('✅ 已安装:', installedSkills.size, '个');
          if (data.message) {
            showToast(data.message, 'info');
          }
          if (data.total === 0 && !data.message) {
            showToast('暂无已安装技能，点击卡片复制命令安装', 'info');
          }
        }
      } catch (e) {
        console.error('加载已安装技能失败:', e);
        showToast('获取已安装技能失败', 'error');
      }
    }

    function renderAgentList() {
      const container = document.getElementById('agentList');
      const agents = [
        { id: 'all', name: '全部', icon: '📚', color: 'linear-gradient(135deg, #10a37f 0%, #14b8a6 100%)' },
        ...Object.entries(AGENT_CONFIG).map(([id, config]) => ({ id, ...config }))
      ];
      
      container.innerHTML = agents.map(agent => {
        const count = agent.id === 'all' ? allSkills.length : allSkills.filter(s => s.agent === agent.id).length;
        return `
          <div class="agent-item ${agent.id === currentAgent ? 'active' : ''}" onclick="selectAgent('${agent.id}')">
            <div class="agent-icon" style="background: ${agent.color}">${agent.icon}</div>
            <span class="agent-name">${agent.name}</span>
            <span class="agent-count">${count}</span>
          </div>
        `;
      }).join('');
    }

    function selectAgent(agentId) {
      currentAgent = agentId;
      document.querySelectorAll('.agent-item').forEach(item => item.classList.remove('active'));
      event.currentTarget.classList.add('active');
      renderSkills();
    }

    function renderSkills() {
      const container = document.getElementById('skillsGrid');
      let skills = allSkills;

      if (currentAgent !== 'all') skills = skills.filter(s => s.agent === currentAgent);
      if (currentFilter === 'installed') skills = skills.filter(s => installedSkills.has(s.id));
      else if (currentFilter === 'new') skills = skills.sort((a, b) => (b.version || '').localeCompare(a.version || ''));

      const searchTerm = document.getElementById('skillSearch').value.toLowerCase();
      if (searchTerm) {
        skills = skills.filter(s => 
          (s.name && s.name.toLowerCase().includes(searchTerm)) ||
          (s.shortDesc && s.shortDesc.toLowerCase().includes(searchTerm)) ||
          (s.fullDesc && s.fullDesc.toLowerCase().includes(searchTerm))
        );
      }

      if (skills.length === 0) {
        container.innerHTML = `<div class="empty-state" style="grid-column: 1/-1;"><div style="font-size: 64px; margin-bottom: 16px;">📦</div><div style="font-size: 18px; font-weight: 600; margin-bottom: 8px;">暂无技能</div><div>${currentFilter === 'installed' ? '暂无已安装的技能' : '该分类下暂无可用技能'}</div></div>`;
        return;
      }

      container.innerHTML = skills.map(skill => {
        const installed = installedSkills.has(skill.id);
        const icon = skill.icon || '📦';
        const name = skill.name || skill.id;
        const shortDesc = skill.shortDesc || skill.desc || skill.description || '';
        const features = skill.features || [];
        const version = skill.version || '1.0.0';
        const installCmd = skill.installCommand || `clawhub install ${skill.id}`;
        const isExpanded = expandedCard === skill.id;
        
        return `
          <div class="skill-card ${isExpanded ? 'expanded' : ''}" id="card-${skill.id}">
            <div class="skill-header" onclick="toggleDetail('${skill.id}')">
              <div class="skill-icon" style="background: ${AGENT_CONFIG[skill.agent]?.color || '#10a37f'}">${icon}</div>
              <div class="skill-info">
                <div class="skill-name">${name}</div>
                <div class="skill-desc">${shortDesc}</div>
              </div>
              <button class="toggle-btn" onclick="event.stopPropagation(); toggleDetail('${skill.id}')">
                <span class="toggle-icon">▼</span>
              </button>
            </div>
            
            <div class="skill-detail">
              <div class="skill-full-desc">${skill.fullDesc || shortDesc}</div>
              ${features.length > 0 ? `<div class="skill-features">${features.map(f => `<span class="feature-tag">${f}</span>`).join('')}</div>` : ''}
              ${skill.example ? `<div class="skill-example"><div class="skill-example-label">💡 使用示例</div><div class="skill-example-text">"${skill.example}"</div></div>` : ''}
              <div class="skill-install-cmd" onclick="event.stopPropagation(); copyCommand('${installCmd}')">
                <code>${installCmd}</code>
                <span style="margin-left: 8px;">📋</span>
              </div>
            </div>
            
            <div class="skill-footer">
              <div class="skill-meta"><span>v${version}</span></div>
              <button class="copy-btn ${installed ? 'copied' : ''}" onclick="event.stopPropagation(); copyCommand('${installCmd}', this)">
                ${installed ? '✓ 已复制' : '📋 复制命令'}
              </button>
            </div>
          </div>
        `;
      }).join('');
    }

    function toggleDetail(skillId) {
      if (expandedCard === skillId) {
        expandedCard = null;
      } else {
        expandedCard = skillId;
      }
      renderSkills();
    }

    function copyCommand(cmd, btn) {
      navigator.clipboard.writeText(cmd).then(() => {
        showToast(`安装命令已复制：${cmd}`, 'success');
        if (btn) {
          btn.textContent = '✓ 已复制';
          btn.classList.add('copied');
          setTimeout(() => {
            btn.textContent = '📋 复制命令';
            btn.classList.remove('copied');
          }, 2000);
        }
      }).catch(() => {
        showToast('复制失败', 'error');
      });
    }

    function filterSkills(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      event.currentTarget.classList.add('active');
      renderSkills();
    }

    function toggleTheme() {
      const body = document.body;
      const isDark = body.getAttribute('data-theme') === 'dark';
      body.setAttribute('data-theme', isDark ? 'light' : 'dark');
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
      document.getElementById('themeIcon').textContent = isDark ? '🌙' : '☀️';
    }

    function loadTheme() {
      const theme = localStorage.getItem('theme') || 'light';
      document.body.setAttribute('data-theme', theme);
      document.getElementById('themeIcon').textContent = theme === 'dark' ? '☀️' : '🌙';
    }

    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.style.cssText = `position: fixed; bottom: 24px; right: 24px; padding: 14px 24px; background: ${type === 'success' ? '#10b981' : type === 'info' ? '#3b82f6' : '#ef4444'}; color: white; border-radius: 12px; font-size: 14px; font-weight: 500; box-shadow: 0 8px 24px rgba(0,0,0,0.15); z-index: 1000; animation: slideIn 0.3s;`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => { toast.style.animation = 'slideOut 0.3s'; setTimeout(() => toast.remove(), 300); }, 3000);
    }

    document.getElementById('skillSearch').addEventListener('input', renderSkills);

    const style = document.createElement('style');
    style.textContent = `@keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } } @keyframes slideOut { from { transform: translateY(0); opacity: 1; } to { transform: translateY(20px); opacity: 0; } }`;
    document.head.appendChild(style);

    init();
  </script>

    <!-- 统一组件加载器 -->
