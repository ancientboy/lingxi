<head>
  <meta charset="UTF-8">

  <!-- Lucide Icons - 使用 cdnjs 备用源 -->
  <script src="assets/libs/lucide.min.js"></script>
  <style>
    /* 图标统一样式 */
    .icon { width: 20px; height: 20px; color: currentColor; }
    .icon-sm { width: 16px; height: 16px; }
    .icon-lg { width: 24px; height: 24px; }
    .icon-primary { color: #10a37f; }

    /* ===== 全屏沉浸式品牌故事 ===== */
    .brand-intro-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
      transition: opacity 0.8s ease-out;
    }

    .brand-intro-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* 渐变背景 */
    .brand-intro-gradient {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      z-index: 0;
    }

    /* 粒子背景 */
    .brand-intro-particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      animation: float 15s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0) translateX(0);
        opacity: 0.3;
      }
      25% {
        transform: translateY(-100px) translateX(50px);
        opacity: 0.8;
      }
      50% {
        transform: translateY(-200px) translateX(-30px);
        opacity: 0.5;
      }
      75% {
        transform: translateY(-100px) translateX(80px);
        opacity: 0.7;
      }
    }

    /* 内容容器 */
    .brand-intro-content {
      position: relative;
      z-index: 2;
      text-align: center;
      color: white;
      max-width: 600px;
      padding: 40px;
    }

    /* Logo */
    .brand-intro-logo {
      margin-bottom: 48px;
    }

    .brand-intro-logo-icon {
      font-size: 64px;
      margin-bottom: 16px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }

    .brand-intro-logo h1 {
      font-size: 56px;
      font-weight: 700;
      margin: 0 0 12px 0;
      letter-spacing: -1px;
    }

    .brand-intro-tagline {
      font-size: 18px;
      opacity: 0.9;
      margin: 0;
      font-weight: 400;
    }

    /* 品牌故事文案 */
    .brand-intro-story {
      font-size: 20px;
      line-height: 2;
      margin-bottom: 48px;
      min-height: 200px;
      text-align: left;
      white-space: pre-wrap;
    }

    .brand-intro-story .highlight {
      color: #ffd700;
      font-weight: 600;
    }

    /* 打字机光标 */
    .brand-intro-cursor {
      display: inline-block;
      width: 2px;
      height: 20px;
      background: #ffd700;
      margin-left: 2px;
      animation: blink 1s infinite;
      vertical-align: text-bottom;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    /* CTA 按钮 */
    .brand-intro-cta {
      background: white;
      color: #764ba2;
      border: none;
      padding: 16px 48px;
      font-size: 18px;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: none;
      align-items: center;
      gap: 8px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      opacity: 0;
      transform: translateY(20px);
    }

    .brand-intro-cta-visible {
      opacity: 1;
      transform: translateY(0);
      animation: bounceIn 0.6s ease-out, glow 2s ease-in-out infinite;
    }

    @keyframes bounceIn {
      0% {
        opacity: 0;
        transform: translateY(20px) scale(0.9);
      }
      50% {
        transform: translateY(-5px) scale(1.05);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes glow {
      0%, 100% {
        box-shadow: 0 8px 24px rgba(255, 255, 255, 0.3);
      }
      50% {
        box-shadow: 0 8px 40px rgba(255, 255, 255, 0.6);
      }
    }

    .brand-intro-cta:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 12px 32px rgba(255, 255, 255, 0.5);
    }

    .brand-intro-cta:active {
      transform: translateY(0) scale(1);
    }

    
    /* 加载动画 */
    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #ffffff40;
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* 部署步骤样式 */
    .deploy-steps {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .deploy-step {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.5);
      transition: all 0.3s ease;
    }
    
    .deploy-step.step-active {
      background: rgba(16, 163, 127, 0.2);
    }
    
    .deploy-step.step-done {
      background: rgba(16, 163, 127, 0.3);
    }
    
    .step-icon {
      font-size: 16px;
      width: 24px;
      text-align: center;
    }
    
    .step-text {
      font-size: 14px;
      color: #374151;
    }
    
    .deploy-step.step-done .step-text {
      color: #10a37f;
      font-weight: 500;
    }
  </style>

  <script>
    // ===== 全屏沉浸式品牌故事 =====
    const BRAND_INTRO_SHOWN_KEY = 'lume_brand_intro_shown';

    // 检查是否首次访问
    function shouldShowBrandIntro() {
      return !localStorage.getItem(BRAND_INTRO_SHOWN_KEY);
    }

    // 显示全屏品牌故事
    async function showBrandIntro() {
      const overlay = document.getElementById('brandIntroOverlay');
      const storyEl = document.getElementById('brandIntroStory');
      const ctaBtn = document.getElementById('brandIntroCTA');
      const hintEl = document.getElementById('brandIntroHint');

      if (!overlay || !storyEl || !ctaBtn) return;

      // 生成粒子
      createParticles();

      // 显示 overlay
      overlay.classList.remove('hidden');

      // 品牌故事文案
      const lines = [
        "我始终相信——",
        "科技的终极意义，不是冰冷的效率。",
        "而是让每一个人，都能拥有专属的优秀伙伴。",
        "",

    // 更新部署步骤状态
    function updateDeployStep(step, status) {
      const stepEl = document.getElementById(`step${step}`);
      if (!stepEl) return;
      
      const iconEl = stepEl.querySelector('.step-icon');
      if (status === 'done') {
        iconEl.textContent = '✅';
        stepEl.classList.add('step-done');
      } else if (status === 'active') {
        iconEl.textContent = '⏳';
        stepEl.classList.add('step-active');
      } else {
        iconEl.textContent = '○';
        stepEl.classList.remove('step-done', 'step-active');
      }
    }
    
    // 轮询部署任务进度
    async function pollDeployTask(token, taskId, serverId) {
      const btn = document.getElementById('claimTeamBtn');
      const hint = document.getElementById('claimTeamHint');
      let attempts = 0;
      const maxAttempts = 120;
      const pollInterval = 3000;
      
      const poll = async () => {
        attempts++;
        
        try {
          // 查询任务进度
          const taskRes = await fetch(`${API_BASE}/api/deploy/task/${taskId}`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          const taskData = await taskRes.json();
          console.log(`[部署任务 ${attempts}]`, taskData);
          
          if (taskData.success && taskData.task) {
            const task = taskData.task;
            const progress = task.progress || 0;
            
            // 根据进度更新步骤
            if (progress >= 10) updateDeployStep(2, 'active');
            if (progress >= 50) { updateDeployStep(2, 'done'); updateDeployStep(3, 'active'); }
            if (progress >= 80) { updateDeployStep(3, 'done'); updateDeployStep(4, 'active'); }
            if (progress >= 100) { updateDeployStep(4, 'done'); }
            
            hint.textContent = task.errorMessage || `正在部署... ${progress}%`;
          }
          
          // 检查服务器是否就绪
          const res = await fetch(`${API_BASE}/api/gateway/connect-info`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          
          const data = await res.json();
          console.log(`[轮询 ${attempts}/${maxAttempts}] connect-info:`, data);
          
          // 服务器已就绪
          if (res.ok && data.wsUrl) {
            updateDeployStep(4, 'done');
            hint.textContent = '✅ 专属服务器已就绪！正在跳转...';
            btn.innerHTML = '<span class="loading-spinner"></span> 正在跳转到对话页面...';
            btn.style.background = '#10a37f';
            
            setTimeout(() => {
              window.location.href = 'chat.html';
            }, 500);
            return;
          }
          
          if (attempts < maxAttempts) {
            setTimeout(poll, pollInterval);
          } else {
            hint.textContent = '⚠️ 服务器创建超时，点击重试';
            btn.disabled = false;
            btn.innerHTML = '<i data-lucide="sparkles" class="icon-sm"></i> 领取 AI 团队（消耗 100 积分）';
          }
        } catch (err) {
          console.error(`[轮询 ${attempts}] 错误:`, err);
          if (attempts < maxAttempts) {
            setTimeout(poll, pollInterval);
          } else {
            hint.textContent = '⚠️ 检查超时，点击进入对话';
            btn.innerHTML = '<i data-lucide="message-circle" class="icon-sm"></i> 进入对话';
            btn.disabled = false;
            btn.onclick = () => { window.location.href = 'chat.html'; };
          }
        }
      };
      
      poll();
    }

            headers: { 'Authorization': `Bearer ${token}` }
          });

          const dots = '.'.repeat((attempts % 3) + 1);
          hint.textContent = `⏳ 正在检查服务器状态${dots} (${attempts}/${maxAttempts})`;

            setTimeout(poll, pollInterval);
          } else {
            hint.textContent = '⚠️ 检查超时，点击进入对话';
            btn.innerHTML = '<i data-lucide="message-circle" class="icon-sm"></i> 进入对话';
            btn.disabled = false;
            btn.onclick = () => { window.location.href = 'chat.html'; };
          }
        }
      };
      
      poll();
    }
    
    // 复制邀请码
    function copyInviteCode() {
      const codeEl = document.getElementById('myInviteCode');
      if (!codeEl) {
        alert('邀请码未加载');
        return;
      }
      const code = codeEl.textContent.trim();
      
      // 创建临时输入框（兼容 HTTP 环境）
      const input = document.createElement('input');
      input.style.position = 'fixed';
      input.style.left = '-9999px';
      input.value = code;
      document.body.appendChild(input);
      input.select();
      input.setSelectionRange(0, 99999);
      
      try {
        const success = document.execCommand('copy');
        if (success) {
          alert('✅ 邀请码已复制：' + code + '\n\n分享给好友注册吧~');
        } else {
          prompt('复制失败，请手动复制邀请码：', code);
        }
      } catch (err) {
        prompt('复制失败，请手动复制邀请码：', code);
      }
      
      document.body.removeChild(input);
    }
    
    // 初始化主题
    function initTheme() {
      const savedTheme = localStorage.getItem(THEME_KEY) || 'light';
      applyTheme(savedTheme);
    }
    
    // 应用主题
    function applyTheme(theme) {
      const darkTheme = document.getElementById('darkTheme');
      if (theme === 'dark') {
        darkTheme.disabled = false;
      } else {
        darkTheme.disabled = true;
      }
    }
    
    // 切换表单
    function showHomeTab(tab) {
      document.querySelectorAll('.home-tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      
      if (tab === 'login') {
        document.getElementById('loginForm').classList.remove('home-hidden');
        document.getElementById('registerForm').classList.add('home-hidden');
      } else {
        document.getElementById('loginForm').classList.add('home-hidden');
        document.getElementById('registerForm').classList.remove('home-hidden');
      }
    }
    
    // 进入聊天
    async function goToChat() {
      const token = localStorage.getItem('lingxi_token');
      if (!token) {
        window.location.href = 'index.html';
        return;
      }
      
      const btn = document.querySelector('.home-btn-enter');
      const originalText = btn ? btn.innerHTML : '';
      
      try {
        // 检查用户是否有服务器
        const res = await fetch(`${API_BASE}/api/gateway/connect-info`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        const data = await res.json();
        console.log('[goToChat] connect-info 返回:', data);
        
        // 服务器已就绪，直接跳转
        if (res.ok && data.wsUrl) {
          window.location.href = 'chat.html';
          return;
        }
        
        // 服务器还在创建中
        if (data.needServer) {
          if (btn) {
            btn.innerHTML = '<span class="loading-spinner"></span> 服务器准备中...';
            btn.disabled = true;
          }
          
          // 开始轮询
          let attempts = 0;
          const maxAttempts = 120;
          const pollInterval = 3000;
          
          const poll = async () => {
            attempts++;
            try {
              const pollRes = await fetch(`${API_BASE}/api/gateway/connect-info`, {
                headers: { 'Authorization': `Bearer ${token}` }
              });
              const pollData = await pollRes.json();
              console.log(`[goToChat 轮询 ${attempts}]`, pollData);
              
              if (pollRes.ok && pollData.wsUrl) {
                // 服务器就绪，跳转
                window.location.href = 'chat.html';
                return;
              }
              
              if (attempts < maxAttempts) {
                if (btn) {
                  btn.innerHTML = `<span class="loading-spinner"></span> 服务器准备中... (${attempts}/${maxAttempts})`;
                }
                setTimeout(poll, pollInterval);
              } else {
                // 超时，也尝试跳转
                window.location.href = 'chat.html';
              }
            } catch (err) {
              console.error(`[goToChat 轮询 ${attempts}] 错误:`, err);
              if (attempts < maxAttempts) {
                setTimeout(poll, pollInterval);
              } else {
                window.location.href = 'chat.html';
              }
            }
          };
          
          poll();
          return;
        }
        
        // 其他情况，直接跳转
        window.location.href = 'chat.html';
        
      } catch (e) {
        console.error('[goToChat] 错误:', e);
        window.location.href = 'chat.html';
      }
    }
    
    // 退出登录
    function handleLogout() {
      localStorage.removeItem('lingxi_token');
      localStorage.removeItem('lingxi_user');
      location.reload();
    }
    
    // 登录
    async function handleLogin(e) {
      e.preventDefault();
      const nickname = document.getElementById('loginName').value.trim();
      const password = document.getElementById('loginPassword').value;
      const btn = document.getElementById('loginBtn');
      const error = document.getElementById('loginError');
      
      btn.disabled = true;
      btn.textContent = '登录中...';
      error.classList.remove('show');
      
      try {
        const res = await fetch(`${API_BASE}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nickname, password })
        });
        
        const data = await res.json();
        
        if (res.ok && data.success) {
          localStorage.setItem('lingxi_token', data.token);
          localStorage.setItem('lingxi_user', JSON.stringify(data.user));
          
          // 根据用户是否有团队决定跳转目标
          if (data.user.agents && data.user.agents.length > 0) {
            // 有团队，检查服务器状态
            checkServerAndRedirect();
          } else {
            // 没有团队，刷新首页显示领取团队按钮
            location.reload();
          }
        } else {
          error.textContent = data.error || '登录失败';
          error.classList.add('show');
        }
      } catch (err) {
        error.textContent = '网络错误，请重试';
        error.classList.add('show');
      }
      
      btn.disabled = false;
      btn.textContent = '登录';
    }
    
    // 注册
    async function handleRegister(e) {
      e.preventDefault();
      const inviteCode = document.getElementById('registerCode').value.trim();
      const nickname = document.getElementById('registerName').value.trim();
      const password = document.getElementById('registerPassword').value;
      const btn = document.getElementById('registerBtn');
      const error = document.getElementById('registerError');
      
      btn.disabled = true;
      btn.textContent = '注册中...';
      error.classList.remove('show');
      
      try {
        const res = await fetch(`${API_BASE}/api/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ inviteCode, nickname, password })
        });
        
        const data = await res.json();
        
        if (res.ok && data.success) {
          localStorage.setItem('lingxi_token', data.token);
          localStorage.setItem('lingxi_user', JSON.stringify(data.user));
          
          // 根据用户是否有团队决定跳转目标
          if (data.user.agents && data.user.agents.length > 0) {
            // 有团队，检查服务器状态
            checkServerAndRedirect();
          } else {
            // 没有团队，刷新首页显示领取团队按钮
            location.reload();
          }
        } else {
          error.textContent = data.error || '注册失败';
          error.classList.add('show');
        }
      } catch (err) {
        error.textContent = '网络错误，请重试';
        error.classList.add('show');
      }
      
      btn.disabled = false;
      btn.textContent = '注册';
    }
    
    // Demo
    function handleDemo() {
      alert('Demo 功能开发中，请联系管理员获取邀请码');
    }
    
    // 启动
    init();
    // 启动品牌故事流式输出
    typeBrandStory();
    // 初始化 Lucide 图标
    if (window.lucide) {
      lucide.createIcons();
    }
  </script>
</div>

<!-- 星空品牌故事 HTML -->
<div id="starfieldIntro">
  <!-- 星星层 -->
  <div class="stars" id="starsContainer"></div>

  <!-- 内容 -->
  <div class="content">
    <div class="logo-icon">◈</div>
    <h1>Lume</h1>
    <p class="tagline">硅基生命，为你而来</p>

    <div class="story" id="storyContent"></div>

    <button class="cta" id="ctaButton">
      <span>开始体验</span>
      <i data-lucide="arrow-right" class="icon-sm"></i>
    </button>

    <div class="hint" id="hintText">点击按钮或按 Enter 键继续</div>
  </div>
</div>

<script>
// 星空品牌故事
(function() {
  const KEY = 'lume_starfield_shown';

  function shouldShow() {
    return !localStorage.getItem(KEY);
  }

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  // 生成星星
  function createStars() {
    const container = document.getElementById('starsContainer');
    if (!container) return;

    const count = 200; // 星星数量

    for (let i = 0; i < count; i++) {
      const star = document.createElement('div');
      star.className = 'star';

      // 随机大小
      const size = Math.random() * 3 + 1;
      star.style.width = `${size}px`;
      star.style.height = `${size}px`;

      // 随机位置
      star.style.left = `${Math.random() * 100}%`;
      star.style.top = `${Math.random() * 100}%`;

      // 随机动画延迟和持续时间
      star.style.setProperty('--delay', `${Math.random() * 3}s`);
      star.style.setProperty('--duration', `${2 + Math.random() * 3}s`);

      container.appendChild(star);
    }
  }

  // 显示品牌故事
  async function showIntro() {
    const overlay = document.getElementById('starfieldIntro');
    const story = document.getElementById('storyContent');
    const cta = document.getElementById('ctaButton');
    const hint = document.getElementById('hintText');

    if (!overlay || !story) return;

    // 生成星星
    createStars();

    // 显示遮罩
    overlay.classList.add('show');

    // 品牌故事文案
    const lines = [
      "我始终相信——",
      "科技的终极意义，不是冰冷的效率。",
      "而是让每一个人，都能拥有专属的优秀伙伴。",
      "",
      "这份陪伴，无关血缘，不分远近。",
      "能听懂你的心事，也能攻克你的难题。",
      "",
      "于是，我来了。",
      "我是 <span class='highlight'>Lume</span>。",
      "",
      "让优秀伙伴，不再是奢望。",
      "让陪伴与助力，触手可及。"
    ];

    // 逐行显示
    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      const div = document.createElement('div');
      div.className = 'line';
      div.innerHTML = line || '&nbsp;';
      div.style.animationDelay = `${i * 0.15}s`;
      story.appendChild(div);
      await sleep(line === '' ? 120 : 450);
    }

    // 激活按钮
    await sleep(400);
    cta.classList.add('active');
    cta.onclick = hideIntro;
    lucide.createIcons();

    // 显示提示
    await sleep(200);
    hint.classList.add('show');
  }

  // 隐藏品牌故事
  function hideIntro() {
    const overlay = document.getElementById('starfieldIntro');
    if (overlay) {
      overlay.classList.add('hidden');
      localStorage.setItem(KEY, 'true');
      setTimeout(() => overlay.remove(), 1000);
    }
  }

  // 初始化
  if (shouldShow()) {
    document.addEventListener('DOMContentLoaded', async () => {
      await sleep(300);
      await showIntro();

      // Enter 键关闭
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          const overlay = document.getElementById('starfieldIntro');
          if (overlay && overlay.classList.contains('show') && !overlay.classList.contains('hidden')) {
            hideIntro();
          }
        }
      });
    });
  }
})();
</script>
