<!-- 技能库页面侧边栏组件 -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <button class="sidebar-close" onclick="toggleSidebar()">
      <i data-lucide="x" class="icon-sm"></i>
    </button>
  </div>
  
  <div class="sidebar-content">
    <!-- Agent 分类 -->
    <div class="sidebar-section">
      <div class="sidebar-section-title">Agent 分类</div>
      <div class="agent-list" id="agentList">
        <div class="agent-item active" onclick="selectAgent('all')">
          <div class="agent-icon" style="background: linear-gradient(135deg, #10a37f 0%, #14b8a6 100%)">📚</div>
          <span class="agent-name">全部</span>
          <span class="agent-count" id="count-all">0</span>
        </div>
        <div class="agent-item" onclick="selectAgent('coder')">
          <div class="agent-icon" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%)">💻</div>
          <span class="agent-name">云溪</span>
          <span class="agent-count" id="count-coder">0</span>
        </div>
        <div class="agent-item" onclick="selectAgent('ops')">
          <div class="agent-icon" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%)">📊</div>
          <span class="agent-name">若曦</span>
          <span class="agent-count" id="count-ops">0</span>
        </div>
        <div class="agent-item" onclick="selectAgent('inventor')">
          <div class="agent-icon" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)">💡</div>
          <span class="agent-name">紫萱</span>
          <span class="agent-count" id="count-inventor">0</span>
        </div>
        <div class="agent-item" onclick="selectAgent('pm')">
          <div class="agent-icon" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)">🎯</div>
          <span class="agent-name">梓萱</span>
          <span class="agent-count" id="count-pm">0</span>
        </div>
        <div class="agent-item" onclick="selectAgent('noter')">
          <div class="agent-icon" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%)">📝</div>
          <span class="agent-name">晓琳</span>
          <span class="agent-count" id="count-noter">0</span>
        </div>
        <div class="agent-item" onclick="selectAgent('media')">
          <div class="agent-icon" style="background: linear-gradient(135deg, #30cfd0 0%, #330867 100%)">🎨</div>
          <span class="agent-name">音韵</span>
          <span class="agent-count" id="count-media">0</span>
        </div>
        <div class="agent-item" onclick="selectAgent('smart')">
          <div class="agent-icon" style="background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%)">🏠</div>
          <span class="agent-name">智家</span>
          <span class="agent-count" id="count-smart">0</span>
        </div>
      </div>
    </div>
  </div>
  
  <!-- 底部功能区 -->
  <div class="sidebar-tools">
    <div class="sidebar-tool-item" onclick="window.location.href='chat.html'">
      <i data-lucide="message-square" class="icon-sm icon-primary"></i>
      <span>对话</span>
    </div>
  </div>
</aside>
