<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>支付成功 - LumeCloud</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 60px 40px;
      text-align: center;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #4ade80, #22c55e);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      animation: scale 0.5s ease;
    }
    @keyframes scale {
      0% { transform: scale(0); }
      100% { transform: scale(1); }
    }
    .icon svg {
      width: 40px;
      height: 40px;
      stroke: white;
      stroke-width: 3;
    }
    h1 { font-size: 24px; color: #1f2937; margin-bottom: 12px; }
    p { color: #6b7280; margin-bottom: 8px; }
    .amount { font-size: 32px; font-weight: 700; color: #22c55e; margin: 20px 0; }
    .countdown { color: #9ca3af; font-size: 14px; margin-top: 20px; }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 14px 40px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: 600;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <h1>支付成功 ✨</h1>
    <p>您的订阅已开通</p>
    <div class="amount" id="amount">¥--</div>
    <p class="countdown"><span id="count">3</span> 秒后自动返回...</p>
    <a href="/chat.html" class="btn">立即返回</a>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById('amount').textContent = '¥' + (params.get('total_amount') || '0.00');
    
    // 3秒后自动跳转
    let count = 3;
    const timer = setInterval(() => {
      count--;
      document.getElementById('count').textContent = count;
      if (count <= 0) {
        clearInterval(timer);
        window.location.href = '/chat.html';
      }
    }, 1000);
  </script>
</body>
</html>
