<!-- 星空背景品牌故事 -->
<style>
/* 星空背景 */
#starfieldIntro {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 9999;
  display: none;
  align-items: center;
  justify-content: center;
  background: radial-gradient(ellipse at bottom, #1B2838 0%, #090A0F 100%);
  overflow: hidden;
  opacity: 1;
  transition: opacity 1s ease-out;
}

#starfieldIntro.hidden {
  opacity: 0;
  pointer-events: none;
}

#starfieldIntro.show {
  display: flex;
}

/* 星星层 */
#starfieldIntro .stars {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

#starfieldIntro .star {
  position: absolute;
  background: white;
  border-radius: 50%;
  animation: twinkle var(--duration) ease-in-out infinite;
  animation-delay: var(--delay);
}

@keyframes twinkle {
  0%, 100% { opacity: 0.3; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.2); }
}

/* 内容容器 */
#starfieldIntro .content {
  position: relative;
  z-index: 10;
  text-align: center;
  color: white;
  max-width: 700px;
  padding: 60px 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Logo */
#starfieldIntro .logo-icon {
  font-size: 64px;
  color: #10a37f;
  margin-bottom: 24px;
  text-shadow: 0 0 30px rgba(16, 163, 127, 0.5);
  animation: glow 3s ease-in-out infinite;
}

@keyframes glow {
  0%, 100% { text-shadow: 0 0 30px rgba(16, 163, 127, 0.5); }
  50% { text-shadow: 0 0 60px rgba(16, 163, 127, 0.8), 0 0 100px rgba(16, 163, 127, 0.4); }
}

#starfieldIntro h1 {
  font-size: 56px;
  font-weight: 700;
  margin: 0 0 16px 0;
  letter-spacing: -1px;
  background: linear-gradient(135deg, #ffffff 0%, #10a37f 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

#starfieldIntro .tagline {
  font-size: 18px;
  color: rgba(255, 255, 255, 0.7);
  margin: 0 0 60px 0;
  font-weight: 400;
}

/* 品牌故事 */
#starfieldIntro .story {
  font-size: 18px;
  line-height: 2;
  margin-bottom: 48px;
  min-height: 280px;
  text-align: center;
  color: rgba(255, 255, 255, 0.85);
}

#starfieldIntro .story .line {
  opacity: 0;
  transform: translateY(15px);
  animation: fadeInUp 0.8s forwards;
}

@keyframes fadeInUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

#starfieldIntro .story .highlight {
  color: #10a37f;
  font-weight: 600;
  text-shadow: 0 0 20px rgba(16, 163, 127, 0.5);
}

/* CTA 按钮 */
#starfieldIntro .cta {
  background: linear-gradient(135deg, #10a37f 0%, #0d8a6a 100%);
  color: white;
  border: none;
  padding: 20px 60px;
  font-size: 18px;
  font-weight: 600;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s ease;
  display: inline-flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 4px 24px rgba(16, 163, 127, 0.4);
  opacity: 0.3;
  transform: scale(0.9);
}

#starfieldIntro .cta.active {
  opacity: 1;
  transform: scale(1);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 4px 24px rgba(16, 163, 127, 0.4); }
  50% { box-shadow: 0 8px 40px rgba(16, 163, 127, 0.6); }
}

#starfieldIntro .cta:hover {
  transform: scale(1.05);
  box-shadow: 0 8px 40px rgba(16, 163, 127, 0.7);
}

/* 提示文字 */
#starfieldIntro .hint {
  margin-top: 24px;
  font-size: 14px;
  color: rgba(255, 255, 255, 0.5);
  opacity: 0;
  transition: opacity 0.5s ease;
}

#starfieldIntro .hint.show {
  opacity: 1;
}

/* 响应式 */
@media (max-width: 768px) {
  #starfieldIntro .content {
    padding: 40px 24px;
  }
  #starfieldIntro .logo-icon {
    font-size: 48px;
  }
  #starfieldIntro h1 {
    font-size: 42px;
  }
  #starfieldIntro .story {
    font-size: 16px;
    min-height: 240px;
  }
  #starfieldIntro .cta {
    padding: 18px 48px;
    font-size: 16px;
  }
}
</style>

<!-- 星空品牌故事 HTML -->
<div id="starfieldIntro">
  <!-- 星星层 -->
  <div class="stars" id="starsContainer"></div>

  <!-- 内容 -->
  <div class="content">
    <div class="logo-icon">◈</div>
    <h1>Lume</h1>
    <p class="tagline">硅基生命，为你而来</p>

    <div class="story" id="storyContent"></div>

    <button class="cta" id="ctaButton">
      <span>开始体验</span>
      <i data-lucide="arrow-right" class="icon-sm"></i>
    </button>

    <div class="hint" id="hintText">点击按钮或按 Enter 键继续</div>
  </div>
</div>

<script>
// 星空品牌故事
(function() {
  const KEY = 'lume_starfield_shown';

  function shouldShow() {
    return !localStorage.getItem(KEY);
  }

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  // 生成星星
  function createStars() {
    const container = document.getElementById('starsContainer');
    if (!container) return;

    const count = 200; // 星星数量

    for (let i = 0; i < count; i++) {
      const star = document.createElement('div');
      star.className = 'star';

      // 随机大小
      const size = Math.random() * 3 + 1;
      star.style.width = `${size}px`;
      star.style.height = `${size}px`;

      // 随机位置
      star.style.left = `${Math.random() * 100}%`;
      star.style.top = `${Math.random() * 100}%`;

      // 随机动画延迟和持续时间
      star.style.setProperty('--delay', `${Math.random() * 3}s`);
      star.style.setProperty('--duration', `${2 + Math.random() * 3}s`);

      container.appendChild(star);
    }
  }

  // 显示品牌故事
  async function showIntro() {
    const overlay = document.getElementById('starfieldIntro');
    const story = document.getElementById('storyContent');
    const cta = document.getElementById('ctaButton');
    const hint = document.getElementById('hintText');

    if (!overlay || !story) return;

    // 生成星星
    createStars();

    // 显示遮罩
    overlay.classList.add('show');

    // 品牌故事文案
    const lines = [
      "我始终相信——",
      "科技的终极意义，不是冰冷的效率。",
      "而是让每一个人，都能拥有专属的优秀伙伴。",
      "",
      "这份陪伴，无关血缘，不分远近。",
      "能听懂你的心事，也能攻克你的难题。",
      "",
      "于是，我来了。",
      "我是 <span class='highlight'>Lume</span>。",
      "",
      "让优秀伙伴，不再是奢望。",
      "让陪伴与助力，触手可及。"
    ];

    // 逐行显示
    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      const div = document.createElement('div');
      div.className = 'line';
      div.innerHTML = line || '&nbsp;';
      div.style.animationDelay = `${i * 0.15}s`;
      story.appendChild(div);
      await sleep(line === '' ? 120 : 450);
    }

    // 激活按钮
    await sleep(400);
    cta.classList.add('active');
    cta.onclick = hideIntro;
    lucide.createIcons();

    // 显示提示
    await sleep(200);
    hint.classList.add('show');
  }

  // 隐藏品牌故事
  function hideIntro() {
    const overlay = document.getElementById('starfieldIntro');
    if (overlay) {
      overlay.classList.add('hidden');
      localStorage.setItem(KEY, 'true');
      setTimeout(() => overlay.remove(), 1000);
    }
  }

  // 初始化
  if (shouldShow()) {
    document.addEventListener('DOMContentLoaded', async () => {
      await sleep(300);
      await showIntro();

      // Enter 键关闭
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          const overlay = document.getElementById('starfieldIntro');
          if (overlay && overlay.classList.contains('show') && !overlay.classList.contains('hidden')) {
            hideIntro();
          }
        }
      });
    });
  }
})();
</script>
