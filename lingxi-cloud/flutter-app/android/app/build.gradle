plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    namespace "cn.lumeword.app"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    // 签名配置
    signingConfigs {
        debug {
            storeFile file('/root/.android/debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            // 使用 debug keystore（仅用于测试）
            // 生产环境应该使用正式的 release keystore
            storeFile file('/root/.android/debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    defaultConfig {
        applicationId "cn.lumeword.app"
        minSdkVersion 23
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        
        // 只包含 arm64-v8a 架构，减小 APK 大小（现代手机都是 64 位）
        ndk {
            abiFilters 'arm64-v8a'
        }
    }

    buildTypes {
        release {
            // 启用代码混淆，减小 APK 大小
            minifyEnabled true
            shrinkResources true
            signingConfig signingConfigs.release
        }
    }
    
    // 自定义 APK 输出文件名
    applicationVariants.all { variant ->
        variant.outputs.all { output ->
            def projectAppFlavorName = output.name
            if (projectAppFlavorName.contains("release")) {
                outputFileName = "lume-v${flutterVersionName}.apk"
            }
        }
    }
}

flutter {
    source '../..'
}

dependencies {}
