name: lingxicloud
description: "Lume AI Assistant"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  
  # 状态管理
  provider: ^6.1.1
  
  # 网络
  dio: ^5.4.0
  web_socket_channel: ^2.4.0
  http: ^1.1.0
  http_parser: ^4.0.2
  
  # 本地存储
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # UI 组件
  flutter_markdown: ^0.6.18
  shimmer: ^3.0.0
  
  # 文件上传
  image_picker: ^1.0.4
  mime_type: ^1.0.0
  
  # URL 启动器
  url_launcher: ^6.2.1
  
  # 语音识别
  speech_to_text: ^6.6.0
  permission_handler: ^11.1.0
  
  # 录音（用于后端语音识别）
  record: ^5.1.2
  path_provider: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

# 应用图标配置
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/lume_logo.png"
  adaptive_icon_background: "#10A37F"
  adaptive_icon_foreground: "assets/images/lume_logo.png"
